<style>
:root {
  --bg: #0f0f1a;
  --bg-card: #1a1a2e;
  --bg-card-hover: #222240;
  --text: #e8e8f0;
  --text-secondary: #9898b0;
  --text-muted: #686888;
  --border: #2a2a45;
  --primary: #6c63ff;
  --primary-glow: rgba(108, 99, 255, 0.15);
  --success: #4ecdc4;
  --warning: #ffd93d;
  --error: #ff6b6b;
  --accent: #a78bfa;
  --radius: 12px;
  --font: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
  --font-mono: 'SF Mono', 'Fira Code', Consolas, monospace;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body { 
  background: var(--bg); 
  font-family: var(--font); 
  color: var(--text); 
  min-height: 100vh;
  padding: 20px;
  max-width: 900px;
  margin: 0 auto;
}

/* Header */
.header { margin-bottom: 24px; display: flex; justify-content: space-between; align-items: center; }
.header h1 { font-size: 22px; font-weight: 700; }
.header h1 span { color: var(--primary); }
.phase-pill { 
  display: inline-flex; align-items: center; gap: 6px;
  padding: 5px 12px; border-radius: 100px; font-size: 11px; font-weight: 600;
  background: rgba(78, 205, 196, 0.1); color: var(--success); border: 1px solid rgba(78, 205, 196, 0.2);
}

/* Stats */
.stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 24px; }
.stat { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; text-align: center; }
.stat-value { font-size: 24px; font-weight: 700; font-family: var(--font-mono); color: var(--text); }
.stat-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-secondary); margin-top: 2px; }

/* Navigation */
.nav { display: flex; gap: 4px; background: var(--bg-card); border-radius: var(--radius); padding: 4px; margin-bottom: 20px; border: 1px solid var(--border); }
.nav-btn { 
  flex: 1; padding: 10px 8px; border-radius: 8px; border: none; 
  background: transparent; color: var(--text-secondary); font-size: 12px; font-weight: 500;
  cursor: pointer; transition: all 0.2s ease; display: flex; flex-direction: column; align-items: center; gap: 4px;
}
.nav-btn i { font-size: 14px; }
.nav-btn:hover { color: var(--text); background: var(--bg-card-hover); }
.nav-btn.active { background: var(--primary); color: white; }

/* Days */
.days { display: flex; gap: 6px; margin-bottom: 16px; overflow-x: auto; padding-bottom: 4px; }
.day-chip {
  padding: 8px 14px; border-radius: 100px; font-size: 12px; font-weight: 500;
  background: var(--bg-card); border: 1px solid var(--border); color: var(--text-secondary);
  cursor: pointer; white-space: nowrap; transition: all 0.15s ease; position: relative;
}
.day-chip:hover { border-color: var(--primary); color: var(--text); }
.day-chip.active { background: var(--primary); border-color: var(--primary); color: white; }
.day-chip.no-egg::after { content: '🚫🥚'; font-size: 8px; position: absolute; top: -4px; right: -2px; }
.day-chip .day-name { font-weight: 600; }

/* Meals */
.meal-list { display: flex; flex-direction: column; gap: 8px; }
.meal-row {
  display: grid; grid-template-columns: 70px 1fr auto auto; align-items: center; gap: 12px;
  padding: 12px 16px; background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius); transition: all 0.15s ease;
}
.meal-row:hover { border-color: var(--primary); background: var(--bg-card-hover); }
.meal-time { font-size: 10px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; font-family: var(--font-mono); }
.meal-food { font-size: 13px; line-height: 1.4; }
.meal-protein { font-size: 12px; font-weight: 700; color: var(--success); font-family: var(--font-mono); }
.meal-kcal { font-size: 11px; color: var(--text-muted); font-family: var(--font-mono); }
.meal-total {
  background: linear-gradient(135deg, rgba(108, 99, 255, 0.1), rgba(78, 205, 196, 0.1));
  border-color: var(--primary);
}
.meal-total .meal-food { font-weight: 600; color: var(--primary); }

/* Grocery */
.grocery-section { display: grid; grid-template-columns: 1fr; gap: 12px; }
.store-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; }
.store-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; font-size: 14px; font-weight: 600; }
.store-icon { width: 28px; height: 28px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 14px; }
.store-icon.mayuri { background: rgba(255, 152, 0, 0.15); color: #ff9800; }
.store-icon.wf { background: rgba(76, 175, 80, 0.15); color: #4caf50; }
.store-icon.costco { background: rgba(33, 150, 243, 0.15); color: #2196f3; }
.grocery-item { 
  display: flex; align-items: center; gap: 10px; padding: 6px 0; font-size: 13px; color: var(--text-secondary); 
}
.checkbox { 
  width: 18px; height: 18px; border: 2px solid var(--border); border-radius: 4px; 
  cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  transition: all 0.15s ease;
}
.checkbox.checked { background: var(--success); border-color: var(--success); }
.checkbox.checked::after { content: '✓'; color: white; font-size: 11px; font-weight: 700; }
.grocery-item.checked-item span { text-decoration: line-through; opacity: 0.5; }

/* Supplements */
.supp-list { display: flex; flex-direction: column; gap: 8px; }
.supp-row {
  display: flex; align-items: center; gap: 12px; padding: 12px 16px;
  background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
}
.supp-time-badge {
  font-size: 10px; font-weight: 600; padding: 3px 10px; border-radius: 100px;
  white-space: nowrap; flex-shrink: 0;
}
.supp-time-badge.morning { background: rgba(255, 217, 61, 0.15); color: var(--warning); }
.supp-time-badge.postgym { background: rgba(108, 99, 255, 0.15); color: var(--primary); }
.supp-time-badge.dinner { background: rgba(78, 205, 196, 0.15); color: var(--success); }
.supp-time-badge.night { background: rgba(167, 139, 250, 0.15); color: var(--accent); }
.supp-name { font-size: 13px; flex: 1; }
.supp-dose { font-size: 11px; color: var(--text-muted); font-family: var(--font-mono); }

/* Prep */
.prep-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; }
.prep-card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.prep-day-badge { font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 100px; background: var(--primary-glow); color: var(--primary); }
.prep-duration { font-size: 11px; color: var(--text-muted); }
.prep-task { display: flex; align-items: flex-start; gap: 8px; padding: 5px 0; font-size: 13px; color: var(--text-secondary); }
.prep-task::before { content: '○'; color: var(--primary); flex-shrink: 0; }

/* Section headers */
.section-title { font-size: 14px; font-weight: 600; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }

/* Tab content */
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* Responsive */
@media (max-width: 600px) {
  body { padding: 12px; }
  .stats { grid-template-columns: repeat(2, 1fr); }
  .meal-row { grid-template-columns: 60px 1fr auto; }
  .meal-kcal { display: none; }
  .header h1 { font-size: 18px; }
}
</style>
</head>

const today = new Date().getDay(); // 0=Sun
const dayMap = [6, 0, 1, 2, 3, 4, 5]; // map JS day to our array index
let activeDay = dayMap[today] || 0;

days.forEach((d, i) => {

  chip.className = `day-chip ${i === activeDay ? 'active' : ''} ${d.noEgg ? 'no-egg' : ''}`;

  chip.onclick = () => {
    document.querySelectorAll('.day-chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    activeDay = i;
    renderMeals(d.key);
  };

});

  const data = meals[day];
  let totalP = 0, totalC = 0;

    totalC += m.cal;
    return `<div class="meal-row">
      <div class="meal-time">${m.time}</div>
      <div class="meal-food">${m.food}</div>
      <div class="meal-protein">${m.protein}g</div>
      <div class="meal-kcal">${m.cal}</div>
    </div>`;
  }).join('') + `<div class="meal-row meal-total">
    <div class="meal-time">TOTAL</div>
    <div class="meal-food">Daily Total</div>
    <div class="meal-protein">${totalP}g</div>
    <div class="meal-kcal">${totalC} kcal</div>
  </div>`;
}

renderMeals(days[activeDay].key);

// Grocery
const groceryEl = document.getElementById('grocery-section');
groceryEl.innerHTML = groceryData.map(store => `
  <div class="store-card">
    <div class="store-header">
      <div class="store-icon ${store.icon}"><i class="fa-solid fa-store"></i></div>

    ${store.items.map(item => `

        <div class="checkbox"></div>
        <span>${item}</span>

// Supplements
document.getElementById('supp-list').innerHTML = supplements.map(s => `
  <div class="supp-row">
    <div class="supp-time-badge ${s.cls}">${s.time}</div>
    <div class="supp-name">${s.name}</div>
    <div class="supp-dose">${s.dose}</div>

`).join('');

// Prep
document.getElementById('prep-section').innerHTML = prepData.map(p => `

      <div class="prep-day-badge">${p.day}</div>

    ${p.tasks.map(t => `<div class="prep-task">${t}</div>`).join('')}

// Tab navigation
document.querySelectorAll('.nav-btn').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('panel-' + btn.dataset.tab).classList.add('active');
  };
});

// Grocery checkboxes (event delegation)
document.getElementById('grocery-section').addEventListener('click', function(e) {
  var item = e.target.closest('.grocery-item');
  if (item) {
    item.classList.toggle('checked-item');
    item.querySelector('.checkbox').classList.toggle('checked');
  }
});

<script>
// PIN GATE LOGIC
(function(){
  var PIN = "1823";
  var SESSION_KEY = "archit_dash_auth";
  var gate = document.getElementById("pin-gate");
  var dashboard = document.getElementById("dashboard-content");
  
  if (!gate || !dashboard) return;

  // Check if already authenticated
  try {
    var stored = localStorage.getItem(SESSION_KEY);
    if (stored) {
      var data = JSON.parse(stored);
      if (data.v === PIN && (Date.now() - data.ts) < 7 * 86400000) {
        gate.style.display = "none";
        dashboard.style.display = "block";
        return;
      }
    }
  } catch(e) {}

  // PIN entry
  var entered = "";
  var dots = document.querySelectorAll("#pin-dots .dot");
  var errorEl = document.getElementById("pin-error");
  var pad = document.getElementById("pin-pad");
  
  if (!pad) return;

  pad.addEventListener("click", function(e) {
    var btn = e.target.closest(".pk");
    if (!btn) return;
    var n = btn.getAttribute("data-n");

    if (n === "del") {
      entered = entered.slice(0, -1);
    } else if (n && n !== "" && entered.length < 4) {
      entered += n;
    } else {
      return;
    }

    // Update dots
    for (var i = 0; i < dots.length; i++) {
      if (i < entered.length) { dots[i].classList.add("filled"); }
      else { dots[i].classList.remove("filled"); }
      dots[i].classList.remove("wrong");
    }

    // Check PIN
    if (entered.length === 4) {
      if (entered === PIN) {
        try { localStorage.setItem(SESSION_KEY, JSON.stringify({ v: PIN, ts: Date.now() })); } catch(ex) {}
        gate.style.display = "none";
        dashboard.style.display = "block";
      } else {
        for (var i = 0; i < dots.length; i++) { dots[i].classList.add("wrong"); }
        if (errorEl) errorEl.style.opacity = "1";
        setTimeout(function() {
          entered = "";
          for (var i = 0; i < dots.length; i++) {
            dots[i].classList.remove("filled");
            dots[i].classList.remove("wrong");
          }
          if (errorEl) errorEl.style.opacity = "0";
        }, 800);
      }
    }
  });
})();
</script>
