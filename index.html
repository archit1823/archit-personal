<head>
<meta charset="UTF-8">

<title>Archit Nutrition Dashboard</title>
<style>
:root {
  --bg: #0f1117;
  --surface: #1a1d27;
  --surface2: #232733;
  --accent: #6c63ff;
  --accent2: #43e97b;
  --text: #e8e8f0;
  --text2: #9ca3af;
  --border: #2d3140;
  --danger: #ef4444;
  --warn: #f59e0b;
  --success: #10b981;
  --noegg: #ff6b9d;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
.pin-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 20px; }
.pin-overlay h2 { font-size: 1.5rem; color: var(--text); }
.pin-input { display: flex; gap: 10px; }
.pin-input input { width: 48px; height: 56px; text-align: center; font-size: 1.5rem; background: var(--surface); border: 2px solid var(--border); border-radius: 12px; color: var(--text); outline: none; }
.pin-input input:focus { border-color: var(--accent); }
.pin-error { color: var(--danger); font-size: 0.85rem; min-height: 20px; }
.container { max-width: 900px; margin: 0 auto; padding: 16px; display: none; }
.header { text-align: center; padding: 20px 0 10px; }
.header h1 { font-size: 1.4rem; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.header .week-label { color: var(--text2); font-size: 0.85rem; margin-top: 4px; }
.stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 16px 0; }
.stat-card { background: var(--surface); border-radius: 12px; padding: 14px 10px; text-align: center; border: 1px solid var(--border); }
.stat-card .value { font-size: 1.3rem; font-weight: 700; color: var(--accent2); }
.stat-card .label { font-size: 0.7rem; color: var(--text2); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.5px; }
.tabs { display: flex; gap: 4px; margin: 16px 0; overflow-x: auto; padding-bottom: 4px; }
.tab-btn { padding: 8px 16px; border-radius: 20px; border: 1px solid var(--border); background: var(--surface); color: var(--text2); font-size: 0.8rem; cursor: pointer; white-space: nowrap; transition: all 0.2s; }
.tab-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.tab-content { display: none; }
.tab-content.active { display: block; }
.day-chips { display: flex; gap: 6px; margin: 12px 0; overflow-x: auto; padding-bottom: 4px; }
.day-chip { padding: 6px 14px; border-radius: 16px; background: var(--surface); border: 1px solid var(--border); font-size: 0.75rem; cursor: pointer; white-space: nowrap; transition: all 0.2s; position: relative; }
.day-chip.active { background: var(--accent); border-color: var(--accent); color: #fff; }
.day-chip.no-egg::after { content: '🚫🥚'; font-size: 0.6rem; position: absolute; top: -6px; right: -4px; }
.meal-card { background: var(--surface); border-radius: 12px; padding: 14px; margin-bottom: 10px; border: 1px solid var(--border); }
.meal-card .meal-time { font-size: 0.7rem; color: var(--accent); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
.meal-card .meal-name { font-size: 0.95rem; font-weight: 600; }
.meal-card .meal-desc { font-size: 0.8rem; color: var(--text2); margin-top: 3px; }
.meal-card .meal-macros { display: flex; gap: 12px; margin-top: 8px; font-size: 0.7rem; color: var(--text2); }
.meal-card .meal-macros span { background: var(--surface2); padding: 2px 8px; border-radius: 8px; }
.cooking-flow { background: var(--surface2); border-radius: 8px; padding: 10px 14px; margin-top: 8px; font-size: 0.75rem; color: var(--accent2); border-left: 3px solid var(--accent2); }
.grocery-section { margin-bottom: 20px; }
.grocery-section h3 { font-size: 0.9rem; margin-bottom: 10px; padding: 8px 12px; background: var(--surface); border-radius: 8px; border-left: 3px solid var(--accent); }
.grocery-item { display: flex; align-items: center; gap: 10px; padding: 8px 12px; border-bottom: 1px solid var(--border); font-size: 0.82rem; }
.grocery-item input[type="checkbox"] { width: 18px; height: 18px; accent-color: var(--accent); }
.grocery-item.checked label { text-decoration: line-through; color: var(--text2); }
.nutrient-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.nutrient-card { background: var(--surface); border-radius: 10px; padding: 12px; border: 1px solid var(--border); }
.nutrient-card .n-name { font-size: 0.75rem; color: var(--text2); }
.nutrient-card .n-value { font-size: 1.1rem; font-weight: 700; margin-top: 2px; }
.nutrient-card .n-bar { height: 4px; background: var(--border); border-radius: 2px; margin-top: 6px; overflow: hidden; }
.nutrient-card .n-bar-fill { height: 100%; border-radius: 2px; background: var(--accent2); }
.supplement-card { background: var(--surface); border-radius: 10px; padding: 14px; margin-bottom: 10px; border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
.supplement-card .s-name { font-weight: 600; font-size: 0.9rem; }
.supplement-card .s-dose { font-size: 0.8rem; color: var(--text2); }
.supplement-card .s-reason { font-size: 0.7rem; color: var(--accent); margin-top: 2px; }
.prep-section { margin-bottom: 20px; }
.prep-section h3 { font-size: 0.95rem; margin-bottom: 10px; color: var(--accent2); }
.prep-item { display: flex; align-items: flex-start; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 0.82rem; }
.prep-item .prep-icon { font-size: 1.1rem; }
.section-title { font-size: 1rem; font-weight: 600; margin: 16px 0 10px; }
@media (max-width: 480px) {
  .stats-row { grid-template-columns: repeat(2, 1fr); }
  .nutrient-grid { grid-template-columns: 1fr; }
}
</style>
</head>

// === RENDER FUNCTIONS ===
var currentDay = 0;

function renderDayChips() {
  var container = document.getElementById('dayChips');
  var html = '';
  for (var i = 0; i < DAYS.length; i++) {
    var d = DAYS[i];
    var cls = 'day-chip';
    if (i === currentDay) cls += ' active';
    if (d.noEgg) cls += ' no-egg';
    html += '<button class="' + cls + '" data-day="' + i + '">' + d.name + ' ' + d.date + '</button>';
  }
  container.innerHTML = html;
  container.querySelectorAll('.day-chip').forEach(function(btn) {
    btn.addEventListener('click', function() {
      currentDay = parseInt(this.getAttribute('data-day'));
      renderDayChips();
      renderMeals();
    });
  });
}

  var dayName = DAYS[currentDay].name;
  var meals = MEALS[dayName];
  var container = document.getElementById('mealCards');

  for (var i = 0; i < meals.length; i++) {
    var m = meals[i];
    html += '<div class="meal-card">';
    html += '<div class="meal-time">' + m.time + '</div>';
    html += '<div class="meal-name">' + m.name + '</div>';
    html += '<div class="meal-desc">' + m.desc + '</div>';
    html += '<div class="meal-macros"><span>' + m.macros + '</span></div>';
    if (m.flow) {
      html += '<div class="cooking-flow">\u27A1 ' + m.flow + '</div>';
    }
    html += '</div>';
  }
  container.innerHTML = html;
}

function renderGrocery() {
  var container = document.getElementById('groceryList');
  var html = '';
  var storeKeys = Object.keys(GROCERY);
  for (var s = 0; s < storeKeys.length; s++) {
    var store = storeKeys[s];
    var items = GROCERY[store];
    html += '<div class="grocery-section">';
    html += '<h3>' + store + '</h3>';
    for (var i = 0; i < items.length; i++) {
      var id = 'g-' + s + '-' + i;
      var checked = localStorage.getItem(id) === '1';
      html += '<div class="grocery-item' + (checked ? ' checked' : '') + '">';
      html += '<input type="checkbox" id="' + id + '"' + (checked ? ' checked' : '') + '>';
      html += '<label for="' + id + '">' + items[i] + '</label>';
      html += '</div>';
    }
    html += '</div>';
  }
  container.innerHTML = html;
  container.querySelectorAll('input[type="checkbox"]').forEach(function(cb) {
    cb.addEventListener('change', function() {
      localStorage.setItem(this.id, this.checked ? '1' : '0');
      this.parentElement.classList.toggle('checked', this.checked);
    });
  });
}

function renderNutrients() {
  var grid = document.getElementById('nutrientGrid');
  var html = '';
  for (var i = 0; i < NUTRIENTS.length; i++) {
    var n = NUTRIENTS[i];
    var color = n.pct >= 90 ? 'var(--accent2)' : n.pct >= 75 ? 'var(--warn)' : 'var(--danger)';
    html += '<div class="nutrient-card">';
    html += '<div class="n-name">' + n.name + '</div>';
    html += '<div class="n-value" style="color:' + color + '">' + n.target + '</div>';
    html += '<div class="n-bar"><div class="n-bar-fill" style="width:' + n.pct + '%;background:' + color + '"></div></div>';
    html += '</div>';
  }
  grid.innerHTML = html;

  var grid2 = document.getElementById('suppReqGrid');
  html = '';
  for (var i = 0; i < SUPP_REQUIRED.length; i++) {
    var n = SUPP_REQUIRED[i];
    html += '<div class="nutrient-card">';
    html += '<div class="n-name">' + n.name + ' (supplement needed)</div>';
    html += '<div class="n-value" style="color:var(--danger)">' + n.target + '</div>';
    html += '<div class="n-bar"><div class="n-bar-fill" style="width:' + n.pct + '%;background:var(--danger)"></div></div>';
    html += '</div>';
  }
  grid2.innerHTML = html;
}

function renderSupplements() {
  var container = document.getElementById('supplementsList');
  var html = '';
  for (var i = 0; i < SUPPLEMENTS.length; i++) {
    var s = SUPPLEMENTS[i];
    html += '<div class="supplement-card">';
    html += '<div><div class="s-name">' + s.name + '</div><div class="s-reason">' + s.reason + '</div></div>';
    html += '<div class="s-dose">' + s.dose + '</div>';
    html += '</div>';
  }
  container.innerHTML = html;
}

function renderPrep() {
  var container = document.getElementById('prepContent');
  var html = '';
  var sections = ['sunday', 'wednesday'];
  for (var s = 0; s < sections.length; s++) {
    var sec = PREP[sections[s]];
    html += '<div class="prep-section">';
    html += '<h3>' + sec.title + '</h3>';
    html += '<p style="font-size:0.75rem;color:var(--text2);margin-bottom:10px;">Start: ' + sec.time + '</p>';
    for (var i = 0; i < sec.items.length; i++) {
      var item = sec.items[i];
      html += '<div class="prep-item"><span class="prep-icon">' + item.icon + '</span><span>' + item.text + '</span></div>';
    }
    html += '</div>';
  }
  container.innerHTML = html;
}

// === TAB SWITCHING ===
document.querySelectorAll('.tab-btn').forEach(function(btn) {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
    document.querySelectorAll('.tab-content').forEach(function(c) { c.classList.remove('active'); });
    this.classList.add('active');
    document.getElementById('tab-' + this.getAttribute('data-tab')).classList.add('active');
  });
});

// === INIT ===
renderDayChips();
renderMeals();
renderGrocery();
renderNutrients();
renderSupplements();
renderPrep();

// === PIN GATE ===
(function() {
  var PIN = '1823';
  var overlay = document.getElementById('pinOverlay');
  var app = document.getElementById('mainApp');
  var inputs = document.querySelectorAll('#pinInput input');
  var error = document.getElementById('pinError');

  if (sessionStorage.getItem('pin-ok') === '1') {
    overlay.style.display = 'none';
    app.style.display = 'block';
    return;
  }

  inputs[0].focus();

  inputs.forEach(function(inp, idx) {
    inp.addEventListener('input', function() {
      if (this.value.length === 1 && idx < 3) {
        inputs[idx + 1].focus();
      }
      var code = '';
      inputs.forEach(function(i) { code += i.value; });
      if (code.length === 4) {
        if (code === PIN) {
          sessionStorage.setItem('pin-ok', '1');
          overlay.style.display = 'none';
          app.style.display = 'block';
        } else {
          error.textContent = 'Incorrect PIN';
          inputs.forEach(function(i) { i.value = ''; });
          inputs[0].focus();
        }
      }
    });
    inp.addEventListener('keydown', function(e) {
      if (e.key === 'Backspace' && !this.value && idx > 0) {
        inputs[idx - 1].focus();
      }
    });
  });
})();
</script>
